<!doctype html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Room - Kiralık Emlak</title>
  <meta name="description" content="Kiralık bina, ev ve arsa ilanları için modern ve sade arayüz.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="#">Room</a>
      <nav class="nav">
        <a href="#ilanlar">Ilanlar</a>
        <a href="#hakkinda">Hakkinda</a>
        <a href="#iletisim">Iletisim</a>
      </nav>
      <button class="btn btn-primary">Ilan Ver</button>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container hero-inner">
        <h1>Kiralık Bina, Ev ve Arsa Ilanlari</h1>
        <p>Sehir merkezinden dogaya uzanan seceneklerle aradigin emlaki kolayca bul.</p>

        <form id="filterForm" class="filter">
          <div class="field">
            <label for="type">Emlak Tipi</label>
            <select id="type">
              <option value="all">Tum Tipler</option>
              <option value="Ev">Ev</option>
              <option value="Bina">Bina</option>
              <option value="Arsa">Arsa</option>
            </select>
          </div>
          <div class="field">
            <label for="city">Sehir</label>
            <select id="city">
              <option value="all">Tum Sehirler</option>
              <option value="Tiflis">Tiflis</option>
              <option value="Batumi">Batumi</option>
              <option value="Kutaisi">Kutaisi</option>
              <option value="Rustavi">Rustavi</option>
            </select>
          </div>
          <div class="field">
            <label for="maxPrice">Maks. Fiyat ($/Ay)</label>
            <input id="maxPrice" type="number" min="100" step="50" placeholder="Orn. 1200">
          </div>
          <button class="btn btn-dark" type="submit">Filtrele</button>
        </form>
      </div>
    </section>

    <section id="ilanlar" class="listings">
      <div class="container">
        <div class="section-head">
          <h2>Guncel Ilanlar</h2>
          <p id="resultText">8 ilan listeleniyor</p>
        </div>
        <div id="listingGrid" class="grid"></div>
      </div>
    </section>

    <section id="hakkinda" class="about">
      <div class="container about-inner">
        <h2>Neden Room?</h2>
        <div class="badges">
          <span>Guvenilir Ilanlar</span>
          <span>Hizli Filtreleme</span>
          <span>Modern Deneyim</span>
        </div>
      </div>
    </section>
  </main>

  <footer id="iletisim" class="footer">
    <div class="container footer-inner">
      <p>© 2026 Room. Tum haklari saklidir.</p>
      <a href="mailto:info@room.ge">info@room.ge</a>
    </div>
  </footer>

  <script th:src="@{/js/app.js}"></script>
</body>
</html>
