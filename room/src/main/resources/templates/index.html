<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Room - Rental Properties</title>
  <meta name="description" content="A modern and clean interface for rental building, house, and land listings.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="#">Room</a>
      <nav class="nav">
        <a href="#listings">Listings</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
      </nav>
      <button class="btn btn-primary">Post Listing</button>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container hero-inner">
        <h1>Rental Building, House, and Land Listings</h1>
        <p>From city center to nature escapes, find the property you need easily.</p>

        <form id="filterForm" class="filter">
          <div class="field">
            <label for="type">Property Type</label>
            <select id="type">
              <option value="all">All Types</option>
              <option value="House">House</option>
              <option value="Building">Building</option>
              <option value="Land">Land</option>
            </select>
          </div>
          <div class="field">
            <label for="city">City</label>
            <select id="city">
              <option value="all">All Cities</option>
              <option value="Tbilisi">Tbilisi</option>
              <option value="Batumi">Batumi</option>
              <option value="Kutaisi">Kutaisi</option>
              <option value="Rustavi">Rustavi</option>
            </select>
          </div>
          <div class="field">
            <label for="maxPrice">Max Price ($/Month)</label>
            <input id="maxPrice" type="number" min="100" step="50" placeholder="Ex. 1200">
          </div>
          <button class="btn btn-dark" type="submit">Filter</button>
        </form>

        <form th:action="@{/listings}" th:object="${listing}" method="post" enctype="multipart/form-data" class="filter" style="margin-top: 1rem;">
          <div class="field">
            <label for="title">Title</label>
            <input id="title" type="text" th:field="*{title}" placeholder="Minimum 5 characters">
            <small th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></small>
          </div>
          <div class="field">
            <label for="description">Description</label>
            <textarea id="description" th:field="*{description}" placeholder="Enter description"></textarea>
            <small th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></small>
          </div>
          <div class="field">
            <label for="file">File</label>
            <input id="file" type="file" th:field="*{file}">
          </div>
          <button class="btn btn-primary" type="submit">Create Listing</button>
        </form>
      </div>
    </section>

    <section id="listings" class="listings">
      <div class="container">
        <div class="section-head">
          <h2>Latest Listings</h2>
          <p id="resultText">8 listings shown</p>
        </div>
        <div id="listingGrid" class="grid"></div>
      </div>
    </section>

    <section id="about" class="about">
      <div class="container about-inner">
        <h2>Why Room?</h2>
        <div class="badges">
          <span>Trusted Listings</span>
          <span>Fast Filtering</span>
          <span>Modern Experience</span>
        </div>
      </div>
    </section>
  </main>

  <footer id="contact" class="footer">
    <div class="container footer-inner">
      <p>© 2026 Room. All rights reserved.</p>
      <a href="mailto:info@room.ge">info@room.ge</a>
    </div>
  </footer>

  <script th:src="@{/js/app.js}"></script>
</body>
</html>
