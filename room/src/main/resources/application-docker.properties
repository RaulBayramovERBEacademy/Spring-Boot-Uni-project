spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://db:5432/roomdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:room}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:room}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.h2.console.enabled=false

logging.level.ge.room.room=INFO
logging.file.name=/app/logs/room.log

room.upload-dir=/app/uploads

room.security.user.password=${ROOM_SECURITY_USER_PASSWORD:password}
room.security.admin.password=${ROOM_SECURITY_ADMIN_PASSWORD:admin}

management.endpoint.health.probes.enabled=true
