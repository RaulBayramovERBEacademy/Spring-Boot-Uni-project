spring.application.name=room
app.info.name=Room
app.info.version=1.0.0

logging.level.ge.room.room=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.file.name=logs/room.log

spring.datasource.url=jdbc:h2:mem:roomdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

room.upload-dir=uploads

room.schedule.listing-report.fixed-rate-ms=300000
room.schedule.listing-report.initial-delay-ms=300000

spring.messages.basename=messages
spring.messages.encoding=UTF-8

spring.cache.type=simple

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true

info.app.name=${app.info.name}
info.app.version=${app.info.version}

room.security.user.username=user
room.security.user.password=password
room.security.admin.username=admin
room.security.admin.password=admin
